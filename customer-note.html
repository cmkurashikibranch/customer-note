<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お客様ノート</title>
<style>
  :root {
    --bg: #F8FAFC;
    --card: #FFFFFF;
    --accent: #2563EB;
    --accent-soft: #EFF6FF;
    --text: #0F172A;
    --text-2: #64748B;
    --radius: 16px;
    --shadow: 0 1px 3px rgba(15,23,42,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    max-width: 480px;
    margin: 0 auto;
    padding: 16px;
    padding-bottom: 90px;
  }
  h1 { font-size: 20px; margin-bottom: 16px; }
  .view { display: none; }
  .view.active { display: block; }
  .card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .btn {
    display: inline-block;
    border: none;
    border-radius: 12px;
    padding: 12px 20px;
    font-size: 15px;
    cursor: pointer;
    background: var(--accent);
    color: #fff;
  }
  .btn-ghost {
    background: transparent;
    color: var(--text-2);
    border: 1px solid #E2E8F0;
  }
  .back-link {
    color: var(--text-2);
    cursor: pointer;
    font-size: 14px;
    margin-bottom: 12px;
    display: inline-block;
  }
</style>
</head>
<body>

<div id="view-home" class="view active">
  <h1>お客様ノート</h1>
</div>

<div id="view-register" class="view">
  <span class="back-link" onclick="showView('home')">← もどる</span>
  <h1>お客様を登録</h1>
</div>

<div id="view-detail" class="view">
  <span class="back-link" onclick="showView('home')">← もどる</span>
</div>

<script>
const STORAGE_KEY = 'customer-note-v1';

const DEFAULT_DATA = {
  customers: [],
  settings: { followUpDays: 14 },
  nextId: 1
};

let appData = null;

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return structuredClone(DEFAULT_DATA);
    const parsed = JSON.parse(raw);
    const data = Object.assign(structuredClone(DEFAULT_DATA), parsed);
    data.settings = Object.assign(structuredClone(DEFAULT_DATA.settings), parsed.settings);
    if (!Array.isArray(data.customers)) data.customers = [];
    if (typeof data.nextId !== 'number') data.nextId = data.customers.length + 1;
    return data;
  } catch (e) {
    console.error('loadData failed', e);
    return structuredClone(DEFAULT_DATA);
  }
}

function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
    return true;
  } catch (e) {
    // QuotaExceededError 等
    alert('保存に失敗しました。容量がいっぱいの可能性があります。古いお客様の写真を削除してください。');
    return false;
  }
}

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
}

function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  window.scrollTo(0, 0);
}

appData = loadData();
</script>
</body>
</html>
